<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Checker by Aadhithyan</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <img src="LOGO_2.png" alt="University Logo" class="logo">
            <h1>Course Checker</h1>
            <p class="subtitle">by Aadhithyan</p>
            <button id="downloadTemplateBtn" class="text-btn">⬇ Download CSV Template</button>
        </header>

        <a href="../index.html" style="position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #002147; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-family: Segoe UI, sans-serif; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid white; transition: transform 0.2s;">&larr; Back to Portal</a>

        <div class="upload-section">
            <div class="file-input-container">
                <h3>Upload All CSVs to Compare</h3>
                <label for="csvFilesInput" class="file-label">
                    <span class="file-icon">📂</span>
                    <span class="file-text" id="labelFiles">Choose CSV Files (Min 2)</span>
                </label>
                <input type="file" id="csvFilesInput" accept=".csv" class="file-input" multiple>
            </div>
        </div>

        <div class="action-section">
            <div class="report-settings">
                <label for="generatedBy">Report Generated By:</label>
                <select id="generatedBy" class="select-input">
                    <option value="Aadhithyan A">Aadhithyan A</option>
                    <option value="Bhagya Nadig">Bhagya Nadig</option>
                </select>
            </div>
            <button id="compareBtn" class="primary-btn">Compare CSVs</button>
        </div>

        <div id="resultsSection" class="results-section hidden">
            <div class="results-header">
                <h2>Comparison Results</h2>
                <div class="export-buttons">
                    <button id="exportPdfBtn" class="secondary-btn">Export PDF</button>
                    <button id="exportExcelBtn" class="secondary-btn">Export Excel</button>
                    <button id="exportCsvBtn" class="secondary-btn">Export CSV</button>
                </div>
            </div>
            <div class="summary-stats">
                <div class="stat-card">
                    <span class="stat-value" id="totalRows">0</span>
                    <span class="stat-label">Total Rows Checked</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value error" id="discrepancyCount">0</span>
                    <span class="stat-label">Discrepancies Found</span>
                </div>
            </div>
            
            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Row</th>
                            <th>Comparison Pair</th>
                            <th>Course Code</th>
                            <th>Field</th>
                            <th>Value in File 1</th>
                            <th>Value in File 2</th>
                            <th>Comment</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Results will be populated here -->
                    </tbody>
                </table>
            </div>
            
            <div id="noDiscrepancies" class="success-message hidden">
                ✅ No discrepancies found! Both CSVs match perfectly.
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
